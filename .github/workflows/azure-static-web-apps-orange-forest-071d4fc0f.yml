name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    # Usa el operador && real, no el HTML escapado
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      # (Opcional) Fijar Node para builds más consistentes
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'   # o 20 si tu proyecto ya es compatible
          cache: 'npm'

      # (Opcional) Instalar dependencias previamente para cachear node_modules
      - name: Install deps
        run: npm ci

      # La acción de SWA construye y despliega.
      # Aquí es donde DEBES pasar tus variables de entorno del build.
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          # === Variables para tu React app (CRA) ===
          REACT_APP_ENV: ${{ secrets.REACT_APP_ENV }}               # debe existir en Secrets (DEV o PROD)
          REACT_APP_API_URL_DEV: ${{ secrets.REACT_APP_API_URL_DEV }}
          REACT_APP_API_URL_PROD: ${{ secrets.REACT_APP_API_URL_PROD }}
          # (Opcional) si usas proxies/otros vars, colócalos aquí con prefijo REACT_APP_
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_FOREST_071D4FC0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}   # PR comments, etc.
          action: "upload"

          # Rutas del proyecto
          app_location: "/"          # código del front en la raíz del repo
          api_location: ""           # no hay API dentro del repo del front

          # CRA genera "build"; si fuera Vite, cambia a "dist"
          output_location: "build"

          # (Opcional) Forzar comando de build si quieres controlarlo
          # app_build_command: "npm run build"
          # (Opcional) Forzar install si lo requieres
          # app_artifact_location: "build"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_FOREST_071D4FC0F }}
          action: "close"
